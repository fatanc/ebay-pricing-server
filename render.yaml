services:
  - type: web
    name: ebay-pricing-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ebay_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EBAY_MARKETPLACE
        value: EBAY_US
